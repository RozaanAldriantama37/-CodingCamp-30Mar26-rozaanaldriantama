<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>Expense Tracker</h1>
    <p class="balance-label">Total Balance</p>
    <p id="balance-display">$0.00</p>
  </header>

  <main>
    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <div class="field">
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" name="name" placeholder="e.g. Lunch" required />
        </div>
        <div class="field">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" placeholder="0.00" min="0.01" step="0.01" required />
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">-- Select --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>
        <button type="submit">Add</button>
      </form>
    </section>

    <section class="list-section">
      <h2>Transactions</h2>
      <ul id="transaction-list"></ul>
    </section>

    <section class="chart-section">
      <h2>Spending by Category</h2>
      <p id="chart-empty-state">No transactions yet.</p>
      <canvas id="spending-chart"></canvas>
    </section>
  </main>

  <div id="notification" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
